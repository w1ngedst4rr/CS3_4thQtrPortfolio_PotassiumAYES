<!DOCTYPE html>
<html>

<head>
<title>Movie List</title>

<style>

body{
    font-family: Arial;
    margin:0;
    padding:0;
}

body::before{
    content:"";
    position:fixed;
    width:100vw;
    height:100vh;
    background-image:url("bg.jpg");
    background-size:cover;
    background-position:center;
    transform:rotate(90deg) scale(1.5);
    z-index:-1;
    opacity:0.35;
}

.container{
    width:520px;
    margin:50px auto;
    background:#f4e9ff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#5b2ca0;
}

label{
    font-weight:bold;
    color:#4a1d85;
}

input,select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #bda4e6;
}

button{
    width:100%;
    padding:12px;
    background:#7b3fe4;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5a28b5;
}

.stars span{
    font-size:28px;
    cursor:pointer;
    color:lightgray;
}

.stars .active{
    color:gold;
}

.movieItem{
    background:white;
    padding:12px;
    margin-top:10px;
    border-radius:6px;
    border-left:5px solid #7b3fe4;
}

.deleteBtn{
    background:#d9534f;
    margin-top:8px;
    width:auto;
    padding:6px 10px;
}

.deleteBtn:hover{
    background:#b52b27;
}

</style>
</head>

<body>

<div class="container">

<h2>Add a Movie</h2>

<label>Title:</label>
<input id="title">

<label>Year:</label>
<select id="year"></select>

<label>Genre:</label>
<select id="genre">
<option>Action</option>
<option>Adventure</option>
<option>Animation</option>
<option>Comedy</option>
<option>Crime</option>
<option>Drama</option>
<option>Fantasy</option>
<option>Horror</option>
<option>Mystery</option>
<option>Romance</option>
<option>Sci-Fi</option>
<option>Thriller</option>
<option>Superhero</option>
<option>Documentary</option>
</select>

<label>Rating:</label>
<div class="stars">
<span data-value="1">★</span>
<span data-value="2">★</span>
<span data-value="3">★</span>
<span data-value="4">★</span>
<span data-value="5">★</span>
</div>

<br><br>

<button onclick="addMovie()">Add Movie</button>

<h2>Movie List</h2>

<div id="movieList"></div>

</div>

<script>


let rating = 0

let stars = document.querySelectorAll(".stars span")

stars.forEach(star => {

    star.addEventListener("click", function(){

        rating = this.dataset.value

        stars.forEach(s => s.classList.remove("active"))

        for(let i=0;i<rating;i++){
            stars[i].classList.add("active")
        }

    })

})



let yearSelect = document.getElementById("year")
let currentYear = new Date().getFullYear()

for(let y=currentYear; y>=1950; y--){

    let option = document.createElement("option")
    option.value = y
    option.textContent = y

    yearSelect.appendChild(option)

}



let movies = JSON.parse(localStorage.getItem("movies")) || []

displayMovies()



function addMovie(){

let title = document.getElementById("title").value
let year = document.getElementById("year").value
let genre = document.getElementById("genre").value

if(title === "" || rating === 0){
alert("Please enter a title and rating")
return
}

let existingMovie = movies.find(
m => m.title.toLowerCase() === title.toLowerCase()
)

if(existingMovie){

existingMovie.year = year
existingMovie.genre = genre

existingMovie.rating =
Math.round((Number(existingMovie.rating) + Number(rating)) / 2)

}else{

let movie = {
title:title,
year:year,
genre:genre,
rating:rating
}

movies.push(movie)

}

localStorage.setItem("movies", JSON.stringify(movies))

displayMovies()

resetForm()

}



function displayMovies(){

let list = document.getElementById("movieList")

list.innerHTML=""

movies.forEach((movie,index)=>{

let stars=""

for(let i=0;i<movie.rating;i++){
stars += "⭐"
}

list.innerHTML += `
<div class="movieItem">

<b>${movie.title}</b> (${movie.year}) - ${movie.genre}

<br>

Rating: ${stars}

<br>

<button class="deleteBtn" onclick="deleteMovie(${index})">
Delete
</button>

</div>
`

})

}



function deleteMovie(index){

let confirmDelete =
confirm("Are you sure you want to delete this movie?")

if(confirmDelete){

movies.splice(index,1)

localStorage.setItem("movies", JSON.stringify(movies))

displayMovies()

}

}



function resetForm(){

document.getElementById("title").value=""
rating=0

stars.forEach(s=>s.classList.remove("active"))

}

</script>

</body>
</html>
